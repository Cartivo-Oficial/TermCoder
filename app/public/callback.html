<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" type="image/png" href="favicon.png" />
<style>
  :root { --bg:#0b0b0c; --fg:#e7e7ea; --muted:#9a9aa3; --faint:#5c5c64; --line:#232327; --accent:#ff7a45;
    --mono: ui-monospace, "SFMono-Regular", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font-family:var(--sans); line-height:1.65;
    min-height:100vh; display:flex; flex-direction:column; }
  a { color:inherit; text-decoration:none; }
  .sys-nav { border-bottom:1px solid var(--line); }
  .sys-nav .in-row { display:flex; align-items:center; height:58px; max-width:1000px; margin:0 auto; padding:0 24px; }
  .mark-cell { margin-right:8px; }
  .brand-mark { display:inline-block; width:16px; height:16px; background:var(--accent);
    -webkit-mask:radial-gradient(circle at 50% 50%, #000 60%, transparent 62%); mask:radial-gradient(circle at 50% 50%, #000 60%, transparent 62%); }
  .wordmark { font-family:var(--mono); font-weight:700; letter-spacing:-.3px; }
  .auth-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:48px 24px; }
  .auth-card { width:min(420px,100%); border:1px solid var(--line); border-radius:14px; padding:32px 28px;
    background:#0f0f11; text-align:center; }
  .mono-eyebrow { font-family:var(--mono); font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--faint); }
  .mono-eyebrow .slash { color:var(--accent); }
  .auth-card h1 { font-size:26px; letter-spacing:-.5px; margin:12px 0 8px; }
  .auth-lead { color:var(--muted); margin:0 0 18px; }
  .auth-note { margin:0; font-family:var(--mono); font-size:13px; }
  .auth-note .link { color:var(--accent); }
</style>
<title>TermCoder — signing in</title>
<meta name="description" content="Completing your TermCoder sign-in." />
</head>
<body class="sys login">

<header class="sys-nav">
  <div class="in-row">
    <div class="mark-cell"><span class="brand-mark" aria-hidden="true"></span></div>
    <div class="row">
      <a class="wordmark" href="index.html">TERMCODER</a>
    </div>
  </div>
</header>

<main class="auth-wrap">
  <div class="auth-card">
    <div class="mono-eyebrow"><span class="slash">//</span> SIGNING IN</div>
    <h1>One moment.</h1>
    <p class="auth-lead" id="cb-status">Completing sign-in…</p>
    <p class="auth-note"><a class="link" href="login.html">Back to sign in</a></p>
  </div>
</main>

<script src="config.js?v=4"></script>
<script src="auth.js?v=6"></script>
<script>window.TCAuth && window.TCAuth.handleCallback();</script>

</body>
</html>
