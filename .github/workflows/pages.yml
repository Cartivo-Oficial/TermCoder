name: Deploy website to GitHub Pages

# Publishes the static site in website/ to GitHub Pages on every push to main
# that touches it. One-time setup: repo Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "app/**"
      - "CHANGELOG.md"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let a newer deploy cancel an in-progress one; never run two at once.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/configure-pages@v5
      - run: npm ci
        working-directory: site
      - run: npm run build
        working-directory: site
      - run: node tools/verify.mjs
        working-directory: site
      # Redesign preview (Vite + React + shadcn) shipped alongside the live site
      # at /preview/ so the main pages and the OAuth callback stay untouched.
      - run: npm ci
        working-directory: app
      - run: npm run build
        working-directory: app
      - run: cp -r app/dist site/dist/preview
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist
      - id: deployment
        uses: actions/deploy-pages@v4
