name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build first so each package's dist/*.d.ts exists — cross-package type
      # imports (e.g. @termcoder/core in the server) resolve during typecheck.
      - run: pnpm -r build

      - run: pnpm -r typecheck

      - run: pnpm test
